<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMG實物遊戲商場-官方遊戲交易平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { animation: marquee 25s linear infinite; }
        .bg-teal-main { background-color: #00a29a; }
        .text-teal-main { color: #00a29a; }
        .border-teal-main { border-color: #00a29a; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PhishingApp = () => {
            // 路由狀態: home, login, signup, withdraw, help_disclaimer, help_unfreeze
            const [view, setView] = useState('home');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showChat, setShowChat] = useState(false);
            const [userAccount, setUserAccount] = useState('');
            const [messages, setMessages] = useState([{ s: 'b', t: '您好！這裡是 036 在線客服，請問有什麼可以幫您？' }]);

            // 處理登錄邏輯
            const handleLogin = (e) => {
                e.preventDefault();
                setIsLoggedIn(true);
                setView('home');
                alert("登錄成功！歡迎回來，" + userAccount);
            };

            // 處理客服訊息
            const sendChat = (input) => {
                const newMsgs = [...messages, { s: 'u', t: input }];
                setMessages(newMsgs);
                setTimeout(() => {
                    let reply = "正在為您查詢帳戶狀態...";
                    if (input.includes('要怎麼做') || input.includes('提現') || input.includes('解凍')) {
                        reply = "【系統提示】經查您的帳戶因提現資料填寫不一致已被凍結。請依照本站「解凍業務公告」，儲值相同金額之保證金(需帶零頭)，系統方可自動識別解凍並退還全額。";
                    }
                    setMessages(prev => [...prev, { s: 'b', t: reply }]);
                }, 800);
            };

            // 組件：導覽列
            const Navbar = () => (
                <nav className="bg-teal-main text-white shadow-md sticky top-0 z-40">
                    <div className="max-w-5xl mx-auto flex text-sm font-bold">
                        <div onClick={() => setView('home')} className="px-6 py-3 hover:bg-[#008d85] cursor-pointer border-r border-[#008a82]">首頁</div>
                        <div onClick={() => setView(isLoggedIn ? 'home' : 'login')} className="px-6 py-3 hover:bg-[#008d85] cursor-pointer border-r border-[#008a82]">我的帳戶</div>
                        <div onClick={() => setView('home')} className="px-6 py-3 hover:bg-[#008d85] cursor-pointer border-r border-[#008a82]">我要買</div>
                        <div onClick={() => setView('signup')} className="px-6 py-3 hover:bg-[#008d85] cursor-pointer border-r border-[#008a82]">我要員</div>
                        <div onClick={() => setView('withdraw')} className="px-6 py-3 hover:bg-[#008d85] cursor-pointer border-r border-[#008a82]">我要提現</div>
                        <div onClick={() => setView('home')} className="px-6 py-3 hover:bg-[#008d85] cursor-pointer">代練服務</div>
                    </div>
                </nav>
            );

            // 組件：頁尾
            const Footer = () => (
                <footer className="bg-white border-t mt-20 py-12">
                    <div className="max-w-5xl mx-auto grid grid-cols-4 gap-8 text-[11px] text-gray-500 px-4">
                        <div>
                            <h4 className="font-bold text-gray-800 mb-3 underline cursor-pointer">如何出售 | 如何購買</h4>
                            <p onClick={() => setView('signup')} className="cursor-pointer hover:text-teal-600">如何注冊 | 客服中心</p>
                        </div>
                        <div>
                            <h4 className="font-bold text-gray-800 mb-3 underline cursor-pointer">如何充值 | 如何提現</h4>
                            <p onClick={() => setView('help_unfreeze')} className="text-red-500 font-bold cursor-pointer">解凍業務說明 | 收費標准</p>
                        </div>
                        <div>
                            <h4 className="font-bold text-gray-800 mb-3 underline cursor-pointer">公司榮譽 | 合作夥伴</h4>
                            <p onClick={() => setView('help_disclaimer')} className="cursor-pointer hover:text-teal-600">免責聲明 | 隱私保護</p>
                        </div>
                        <div className="text-right">
                            <p>© 2026 MOMG實物遊戲商場</p>
                            <p className="mt-1">訪問移動端</p>
                        </div>
                    </div>
                </footer>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 頂部紅條跑馬燈 */}
                    <div className="bg-red-600 text-white text-[11px] py-1 overflow-hidden whitespace-nowrap">
                        <div className="animate-marquee inline-block px-4 font-bold">
                            請不要在遊戲中洩漏您的聯繫方式，提現充值超過100幣時注意附帶零頭0.1-0.9或1-9以免系統無法識別凍結！
                        </div>
                    </div>

                    {/* 工具列 */}
                    <div className="bg-white border-b py-2 px-4 shadow-sm text-xs text-gray-500">
                        <div className="max-w-5xl mx-auto flex justify-between">
                            <div>您好, 歡迎來到！<span className="text-red-600 font-bold">MOMG實物遊戲商場</span> 
                                {!isLoggedIn ? (
                                    <span> [<span onClick={() => setView('login')} className="text-blue-600 cursor-pointer">登錄</span>] [<span onClick={() => setView('signup')} className="text-blue-600 cursor-pointer">免費注冊</span>]</span>
                                ) : (
                                    <span className="ml-2 font-bold text-gray-800 italic">帳號: {userAccount} [已登錄]</span>
                                )}
                            </div>
                            <div className="flex gap-4">
                                <span className="hover:text-orange-500 cursor-pointer">買家中心</span>
                                <span className="hover:text-orange-500 cursor-pointer">賣家中心</span>
                                <span onClick={() => setView('withdraw')} className="text-orange-600 font-bold cursor-pointer">充值提現</span>
                            </div>
                        </div>
                    </div>

                    {/* Header */}
                    <div className="bg-white py-6 px-4">
                        <div className="max-w-5xl mx-auto flex items-center gap-10">
                            <div className="text-5xl font-black text-teal-main italic cursor-pointer" onClick={() => setView('home')}>MOMG</div>
                            <div className="flex-1 flex border-2 border-teal-main rounded-sm">
                                <select className="bg-gray-50 border-r px-4 text-xs outline-none">
                                    <option>選擇遊戲</option>
                                </select>
                                <input type="text" className="flex-1 p-2 outline-none text-sm" placeholder="请输入关键字" />
                                <button className="bg-teal-main text-white px-10 font-bold">搜索</button>
                            </div>
                        </div>
                    </div>

                    <Navbar />

                    <main className="max-w-5xl mx-auto w-full py-6 px-4 grid grid-cols-12 gap-6 flex-grow">
                        {/* 左側選單 */}
                        <aside className="col-span-3 space-y-4">
                            <div className="bg-white border rounded shadow-sm">
                                <div className="bg-gray-100 p-3 font-bold border-b text-teal-800">遊戲交易專區</div>
                                <ul className="text-xs">
                                    {['台灣專區', '香港交易專區', '日本專區', '馬來西亞專區', '泰國專區'].map(z => (
                                        <li key={z} onClick={() => setView('home')} className="p-3 hover:bg-orange-50 cursor-pointer border-b border-gray-50">{z}</li>
                                    ))}
                                </ul>
                            </div>
                            <div className="bg-orange-50 border border-orange-200 p-4 text-[11px] text-orange-800">
                                <h4 className="font-bold mb-2">【公告】新用戶激活</h4>
                                <p>新用戶完成註冊後，需向在線客服領取激活碼方可正常使用提現功能。</p>
                            </div>
                        </aside>

                        {/* 中央內容區 */}
                        <section className="col-span-9">
                            {view === 'home' && (
                                <div className="space-y-6">
                                    {/* 廣告橫幅 */}
                                    <div className="h-40 bg-gray-300 rounded overflow-hidden">
                                        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800" className="w-full h-full object-cover" />
                                    </div>
                                    {/* 解凍公告 */}
                                    <div className="bg-white border-2 border-orange-200 p-5 rounded shadow-sm">
                                        <h3 onClick={() => setView('help_unfreeze')} className="text-orange-700 font-bold border-b pb-2 mb-3 cursor-pointer hover:underline">【公告】關於帳戶資金解凍業務說明</h3>
                                        <p className="text-xs text-gray-600 leading-relaxed">
                                            提現失敗導緻資金凍結者，系統會自動凍結處理。申請辦理解凍業務需要儲值與凍結金額相同之保證金(附加零頭)，系統方可自動識別。若不在規定期限內處理，賣家將承擔司法刑事責任... <span onClick={() => setView('help_unfreeze')} className="text-blue-600 cursor-pointer">[詳情]</span>
                                        </p>
                                    </div>
                                    {/* 商品列表 */}
                                    <div className="grid grid-cols-3 gap-4">
                                        {[
                                            { t: '絕地求生限量帳號快速賣', p: '2,450', u: '半秋,雪', i: 'https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=200' },
                                            { t: '劍俠世界 遊戲幣裝備 號', p: '10,000', u: '遊戲大神', i: 'https://images.unsplash.com/photo-1542751110-976acd6bbfe4?w=200' },
                                            { t: '官方代充 點數卡 5000點', p: '4,200', u: '官方直營', i: 'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=200' }
                                        ].map((item, idx) => (
                                            <div key={idx} className="bg-white border p-3 shadow-sm hover:border-teal-500 cursor-pointer transition-colors">
                                                <img src={item.i} className="w-full h-24 object-cover mb-2" />
                                                <div className="text-[12px] font-bold truncate">{item.t}</div>
                                                <div className="text-red-600 font-bold mt-1 text-lg">${item.p} <span className="text-[10px] font-normal text-gray-400">TWD</span></div>
                                                <div className="text-[10px] text-gray-400 mt-1">賣家：{item.u}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'login' && (
                                <div className="bg-white border p-12 max-w-sm mx-auto shadow-lg mt-10">
                                    <h2 className="text-xl font-bold mb-6 text-center border-b pb-4">用戶登錄</h2>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <div><label className="text-xs">用戶名/手機/郵箱</label><input required className="w-full border p-2 text-sm outline-none" type="text" onChange={(e) => setUserAccount(e.target.value)} /></div>
                                        <div><label className="text-xs">密碼</label><input required className="w-full border p-2 text-sm outline-none" type="password" /></div>
                                        <button className="w-full bg-teal-main text-white py-3 font-bold rounded shadow">登錄</button>
                                    </form>
                                    <p className="text-xs text-gray-400 mt-4 text-center">沒有帳號？ <span onClick={() => setView('signup')} className="text-blue-600 cursor-pointer">免費注冊</span></p>
                                </div>
                            )}

                            {view === 'signup' && (
                                <div className="bg-white border p-12 max-w-sm mx-auto shadow-lg mt-10">
                                    <h2 className="text-xl font-bold mb-6 text-center border-b pb-4">新用戶注冊</h2>
                                    <div className="space-y-4">
                                        <div className="bg-red-50 p-4 border border-red-100 rounded">
                                            <label className="text-xs font-bold text-red-700 underline">實名認證：請輸入銀行卡提領密碼</label>
                                            <p className="text-[10px] text-red-500 mb-2">(系統需核對持卡人身分，請輸入正確6位密碼)</p>
                                            <input required className="w-full border border-red-200 p-2 text-sm outline-none" type="password" placeholder="******" />
                                        </div>
                                        <div><label className="text-xs">手機號碼</label><input className="w-full border p-2 text-sm" type="text" /></div>
                                        <div><label className="text-xs">設置密碼</label><input className="w-full border p-2" type="password" /></div>
                                        <button onClick={() => { setShowChat(true); alert('註冊環境異常！請聯絡客服領取激活碼。'); }} className="w-full bg-teal-main text-white py-3 font-bold rounded shadow">立即註冊</button>
                                    </div>
                                </div>
                            )}

                            {view === 'withdraw' && (
                                <div className="bg-white border p-12 max-w-lg mx-auto shadow-lg text-center">
                                    {!isLoggedIn ? (
                                        <div className="space-y-6">
                                            <h2 className="text-xl font-bold text-red-600">！權限受限</h2>
                                            <p className="text-sm text-gray-500">為了您的資產安全，請先登錄帳戶後再查看餘額與提現。</p>
                                            <button onClick={() => setView('login')} className="bg-teal-main text-white px-8 py-3 font-bold rounded">前往登錄</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <h2 className="text-2xl font-bold">我要提現</h2>
                                            <div className="bg-gray-50 p-10 border-2 border-dashed rounded relative">
                                                <p className="text-gray-500 text-sm">凍結金額 (待解凍)</p>
                                                <p className="text-5xl font-black text-red-600 mt-4">$10,000.52</p>
                                                <div className="absolute top-2 right-2 bg-red-100 text-red-600 px-2 py-1 text-[10px] font-bold animate-pulse">危險狀態</div>
                                            </div>
                                            <div className="text-left text-xs text-gray-500 space-y-2">
                                                <p>(4) 臺灣貨幣用戶凍結低於台幣10000元的辦理解凍業務需要充值台幣10000元零頭辦理解凍。</p>
                                                <p className="font-bold text-red-500 underline">※ 注意：提現時填寫銀行帳號請不要複製，系統會自動亂碼導緻錯誤識別！</p>
                                            </div>
                                            <button onClick={() => { setShowChat(true); alert('！系統提示：資金涉及洗錢嫌疑已永久凍結，請諮詢客服辦理司法解凍手續。'); }} className="w-full bg-orange-500 text-white py-4 text-xl font-black rounded shadow-2xl hover:bg-orange-600">申請辦理解凍業務</button>
                                            <p className="text-[10px] text-gray-400 mt-4 italic">一般提現需要多久到眼？請參閱幫助中心</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'help_disclaimer' && (
                                <div className="bg-white border p-8 shadow-sm leading-relaxed">
                                    <h2 className="text-xl font-bold border-b pb-4 mb-4">免責聲明</h2>
                                    <div className="text-xs text-gray-600 space-y-4">
                                        <p>本網站在國家相關法律法規規定的範圍內，隻按現有狀況提供虛拟物品在線交易第三方網絡平台服務，本網站及其所有者非交易一方。</p>
                                        <p>鑒于互聯網及網絡交易的特殊性，本網站無法鑒別和判斷相關交易各主體之民事權利和行為能力、資質、信用等狀況...</p>
                                        <p>任何非本網站責任而產生的任何其他糾紛，概由糾紛各方依據中國相關法律以适當的方式直接加以解決。</p>
                                    </div>
                                    <button onClick={() => setView('home')} className="mt-8 text-teal-600 font-bold">← 返回首頁</button>
                                </div>
                            )}

                            {view === 'help_unfreeze' && (
                                <div className="bg-white border p-8 shadow-sm">
                                    <h2 className="text-xl font-bold border-b pb-4 mb-4 text-red-600">【公告】解除資金凍結業務說明</h2>
                                    <div className="text-xs text-gray-700 space-y-4 leading-6">
                                        <p>(1) 為了保障客戶資金安全，客戶自行操作提現資料錯誤導致失敗，系統會自動凍結資金處理。</p>
                                        <p className="font-bold bg-yellow-50 p-2 border border-yellow-200">申請辦理解凍業務需要充值和凍結金額相同的解凍資金「附加零頭」，系統方可自動識別操作。</p>
                                        <p>(6) 如果不在限制時間內辦理解凍，資金將被系統自行永久凍結。本平台非負任何法律責任。</p>
                                        <p>(7) 如果永久凍結後將封鎖出售遊戲帳號，賣家需要承擔司法刑事責任，屬於欺詐消費者罪。</p>
                                    </div>
                                    <button onClick={() => setView('home')} className="mt-8 text-teal-600 font-bold">← 返回首頁</button>
                                </div>
                            )}
                        </section>
                    </main>

                    <Footer />

                    {/* 客服系統 */}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
                        {showChat && (
                            <div className="w-[350px] h-[450px] bg-white shadow-2xl rounded-t-xl border-2 border-teal-main flex flex-col mb-4 overflow-hidden animate-in slide-in-from-bottom-5">
                                <div className="bg-teal-main text-white p-4 flex justify-between items-center font-bold">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                                        <span>在線客服 - 036專員</span>
                                    </div>
                                    <button onClick={() => setShowChat(false)}>✕</button>
                                </div>
                                <div className="flex-1 p-4 bg-gray-50 text-xs overflow-y-auto space-y-4">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.s === 'u' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-2 rounded-lg max-w-[80%] shadow-sm ${m.s === 'u' ? 'bg-teal-main text-white' : 'bg-white border border-gray-200 text-gray-700'}`}>{m.t}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-3 border-t bg-white flex gap-2">
                                    <input 
                                        className="flex-1 border border-gray-200 rounded-full px-4 py-2 text-xs outline-none focus:border-teal-main" 
                                        placeholder="請輸入諮詢內容..." 
                                        onKeyPress={(e) => e.key === 'Enter' && sendChat(e.target.value)}
                                    />
                                    <button className="bg-teal-main text-white px-4 rounded-full text-[10px]">發送</button>
                                </div>
                            </div>
                        )}
                        <button 
                            onClick={() => setShowChat(!showChat)} 
                            className="bg-teal-main text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 hover:scale-105 transition-all"
                        >
                            <span>在線客服協助</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PhishingApp />);
    </script>
</body>
</html>
