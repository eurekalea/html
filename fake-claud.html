
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{min-height:640px;padding:1rem 0;font-family:var(--font-sans)}
.header{text-align:center;margin-bottom:1rem}
.header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:13px;color:var(--color-text-secondary);margin-top:4px}
.counter{display:flex;justify-content:center;gap:2rem;margin:.5rem 0}
.counter-item{text-align:center}
.counter-num{font-size:22px;font-weight:500}
.counter-label{font-size:11px;color:var(--color-text-secondary)}
.share-num{color:#1D9E75}.no-num{color:#E24B4A}
.progress-bar{background:var(--color-background-secondary);border-radius:4px;height:5px;margin:.5rem 1rem}
.progress-fill{background:#378ADD;height:100%;border-radius:4px;transition:width .3s}
.card-stack{position:relative;height:480px;margin:0 1rem;overflow:hidden}
.card-shadow2{position:absolute;width:calc(100% - 28px);height:100%;left:14px;top:12px;background:var(--color-border-tertiary);border-radius:14px}
.card-shadow1{position:absolute;width:calc(100% - 14px);height:100%;left:7px;top:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:14px}
.card{position:absolute;width:100%;height:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:14px;overflow:hidden;cursor:grab;user-select:none;display:flex;flex-direction:column;will-change:transform}
.card:active{cursor:grabbing}
.card.slide-right{animation:slideR .35s cubic-bezier(.4,0,1,1) forwards}
.card.slide-left{animation:slideL .35s cubic-bezier(.4,0,1,1) forwards}
@keyframes slideR{to{transform:translateX(110%);opacity:0}}
@keyframes slideL{to{transform:translateX(-110%);opacity:0}}
.card-illo{flex:0 0 200px;overflow:hidden;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center}
.card-illo svg{width:100%;height:200px}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .1s;border-radius:14px}
.overlay-share{background:rgba(29,158,117,.13)}
.overlay-no{background:rgba(226,75,74,.13)}
.overlay-text{font-size:26px;font-weight:500;padding:.4rem 1.2rem;border-radius:10px;border:2.5px solid}
.overlay-share .overlay-text{color:#0F6E56;border-color:#1D9E75}
.overlay-no .overlay-text{color:#A32D2D;border-color:#E24B4A}
.card-body-wrap{flex:1;padding:.75rem 1rem;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.case-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500;width:fit-content}
.tag-fiction{background:#EEEDFE;color:#534AB7}
.tag-news{background:#E6F1FB;color:#185FA5}
.tag-misinfo{background:#FCEBEB;color:#A32D2D}
.tag-factcheck{background:#EAF3DE;color:#3B6D11}
.card-title{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.card-source{font-size:11px;color:var(--color-text-secondary)}
.card-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.55}
.card-prompt{background:var(--color-background-secondary);border-radius:8px;padding:.5rem .75rem;margin-top:2px}
.card-prompt p{font-size:12px;color:var(--color-text-primary)}
.card-num{position:absolute;top:9px;right:11px;font-size:10px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:2px 7px;border-radius:10px}
.btns{display:flex;gap:10px;padding:.6rem 1rem .75rem;border-top:.5px solid var(--color-border-tertiary)}
.btn-no{flex:1;padding:.55rem;border-radius:9px;border:.5px solid #E24B4A;background:#FCEBEB;color:#A32D2D;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-share{flex:1;padding:.55rem;border-radius:9px;border:.5px solid #1D9E75;background:#E1F5EE;color:#0F6E56;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-no:hover{background:#F7C1C1}.btn-share:hover{background:#9FE1CB}
.done{padding:1.5rem 1rem;text-align:center}
.done h2{font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.25rem}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.stat-box{background:var(--color-background-secondary);border-radius:10px;padding:.85rem}
.stat-box .num{font-size:30px;font-weight:500}
.stat-box .lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:2px}
.stat-box .sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.chips-section{text-align:left;margin:.75rem 0}
.chips-section h3{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:.4rem}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:3px 9px;border-radius:10px}
.chip-share{background:#E1F5EE;color:#0F6E56;border:.5px solid #5DCAA5}
.chip-no{background:#FCEBEB;color:#A32D2D;border:.5px solid #F09595}
.restart{margin-top:1rem;padding:.6rem 1.8rem;border-radius:9px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:14px;cursor:pointer}
</style>

<div id="app">
  <div class="header">
    <h1>媒體識讀大挑戰</h1>
    <p>向右滑 分享給朋友 ／ 向左滑 不分享</p>
  </div>
  <div class="counter">
    <div class="counter-item"><div class="counter-num share-num" id="sc">0</div><div class="counter-label">分享</div></div>
    <div class="counter-item"><div class="counter-num" id="ci">1</div><div class="counter-label">/ 30</div></div>
    <div class="counter-item"><div class="counter-num no-num" id="nc">0</div><div class="counter-label">不分享</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
  <div class="card-stack" id="cs">
    <div class="card-shadow2"></div>
    <div class="card-shadow1"></div>
    <div class="card" id="mc">
      <div class="card-illo" id="illo"></div>
      <div class="card-body-wrap" id="cb"></div>
      <div class="overlay overlay-share" id="os"><div class="overlay-text">分享</div></div>
      <div class="overlay overlay-no" id="on"><div class="overlay-text">不分享</div></div>
      <div class="card-num" id="cn"></div>
    </div>
  </div>
  <div class="btns" id="ba">
    <button class="btn-no" onclick="swipe('left')">✕ 不分享</button>
    <button class="btn-share" onclick="swipe('right')">分享給朋友 ✓</button>
  </div>
  <div id="done" style="display:none"></div>
</div>

  {tag:'misinfo',tagLabel:'政治攻擊',title:'台灣國土都被詐騙集團大肆破壞',source:'TikTok',body:'影片稱台灣國土被詐騙集團大肆破壞殆盡，配合#舊滅慰安尻民進黨標籤，稱台灣已變成「光電鬼島」，是民進黨的傑作。',prompt:'這是使用強烈政治攻擊語言的TikTok影片，你會分享嗎？'},

const tagColors={fiction:'tag-fiction',news:'tag-news',misinfo:'tag-misinfo',factcheck:'tag-factcheck'};
let cur=0,shareList=[],noList=[],shareTimes=[],noTimes=[],t0=Date.now();

function renderCard(){
  if(cur>=cases.length){showDone();return;}
  const c=cases[cur];
  const mc=document.getElementById('mc');
  mc.style.transform='';mc.style.opacity='';mc.style.pointerEvents='';
  document.getElementById('illo').innerHTML=illos[cur]||'';
  document.getElementById('cb').innerHTML=`
    <span class="case-tag ${tagColors[c.tag]||'tag-news'}">${c.tagLabel}</span>
    <div class="card-title">${c.title}</div>
    <div class="card-source">${c.source}</div>
    <div class="card-desc">${c.body}</div>
    <div class="card-prompt"><p>🤔 ${c.prompt}</p></div>`;
  document.getElementById('cn').textContent=`${cur+1} / ${cases.length}`;
  document.getElementById('ci').textContent=cur+1;
  document.getElementById('pf').style.width=`${(cur/cases.length)*100}%`;
  document.getElementById('os').style.opacity='0';
  document.getElementById('on').style.opacity='0';
  t0=Date.now();
}

function swipe(dir){
  const elapsed=(Date.now()-t0)/1000;
  const mc=document.getElementById('mc');
  const c=cases[cur];
  if(dir==='right'){shareList.push(c);shareTimes.push(elapsed);document.getElementById('sc').textContent=shareList.length;mc.classList.add('slide-right');}
  else{noList.push(c);noTimes.push(elapsed);document.getElementById('nc').textContent=noList.length;mc.classList.add('slide-left');}
  mc.style.pointerEvents='none';
  setTimeout(()=>{mc.classList.remove('slide-right','slide-left');cur++;renderCard();},330);
}

let drag=false,sx=0,dx=0;
const mc=document.getElementById('mc');
mc.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;dx=0;});
mc.addEventListener('touchstart',e=>{drag=true;sx=e.touches[0].clientX;dx=0;},{passive:true});
document.addEventListener('mousemove',e=>{
  if(!drag)return;
  dx=e.clientX-sx;
  mc.style.transform=`translateX(${dx}px)`;
  const t=Math.min(Math.abs(dx)/80,1);
  document.getElementById('os').style.opacity=dx>0?t:0;
  document.getElementById('on').style.opacity=dx<0?t:0;
});
document.addEventListener('touchmove',e=>{
  if(!drag)return;
  dx=e.touches[0].clientX-sx;
  mc.style.transform=`translateX(${dx}px)`;
  const t=Math.min(Math.abs(dx)/80,1);
  document.getElementById('os').style.opacity=dx>0?t:0;
  document.getElementById('on').style.opacity=dx<0?t:0;
},{passive:true});
function endDrag(){
  if(!drag)return;drag=false;
  if(dx>80)swipe('right');
  else if(dx<-80)swipe('left');
  else{mc.style.transform='';document.getElementById('os').style.opacity='0';document.getElementById('on').style.opacity='0';}
}
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function avg(a){return a.length?(a.reduce((x,y)=>x+y,0)/a.length).toFixed(1):'0';}

function showDone(){
  document.getElementById('cs').style.display='none';
  document.getElementById('ba').style.display='none';
  document.getElementById('pf').style.width='100%';
  const sc=shareList.map(c=>`<span class="chip chip-share">${c.title.slice(0,12)}…</span>`).join('');
  const nc=noList.map(c=>`<span class="chip chip-no">${c.title.slice(0,12)}…</span>`).join('');
  document.getElementById('done').style.display='block';
  document.getElementById('done').innerHTML=`
    <div class="done">
      <h2>你的判斷統計</h2>
      <div class="stat-grid">
        <div class="stat-box" style="border-left:3px solid #1D9E75">
          <div class="lbl">分享給朋友</div>
          <div class="num share-num">${shareList.length}</div>
          <div class="sub">平均 ${avg(shareTimes)} 秒決定</div>
        </div>
        <div class="stat-box" style="border-left:3px solid #E24B4A">
          <div class="lbl">不分享</div>
          <div class="num no-num">${noList.length}</div>
          <div class="sub">平均 ${avg(noTimes)} 秒決定</div>
        </div>
      </div>
      ${shareList.length>0?`<div class="chips-section"><h3>你選擇分享的內容（${shareList.length} 則）</h3><div class="chips">${sc}</div></div>`:''}
      ${noList.length>0?`<div class="chips-section"><h3>你選擇不分享的內容（${noList.length} 則）</h3><div class="chips">${nc}</div></div>`:''}
      <button class="restart" onclick="restart()">重新開始</button>
    </div>`;
}

function restart(){
  cur=0;shareList=[];noList=[];shareTimes=[];noTimes=[];
  document.getElementById('sc').textContent='0';
  document.getElementById('nc').textContent='0';
  document.getElementById('cs').style.display='';
  document.getElementById('ba').style.display='';
  document.getElementById('done').style.display='none';
  renderCard();
}

renderCard();
</script>
