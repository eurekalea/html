<head>
	<title>Sort Scale</title>

	<!-- startup image for web apps - iPad - portrait (768x1004) -->

	<!-- startup image for web apps (320x460) -->

	<style>
	body {
	color: #000000;
	background: #ffffff;
	}

	/* Checkbox overlay positioned above box[0]~box[7] */
	#checkbox-overlay {
		position: absolute;
		left: 0;
		top: 0;
		width: 100%;
		height: 100%;
		pointer-events: none; /* let canvas events pass through */
		z-index: 999;
	}

	#checkbox-row {
		position: absolute;
		/* boxes start at x=92, each 120px wide; y=678 is box center, box height=140, so top=678-70=608 */
		/* place checkboxes at the very top of the box area */
		left: 0;
		top: 0;
		display: flex;
		pointer-events: none;
	}

	.cb-cell {
		width: 120px;
		height: 30px;
		display: flex;
		align-items: center;
		justify-content: center;
		pointer-events: all; /* re-enable for checkbox cells */
		background: rgba(255,255,255,0.85);
		border: 1px solid #ccc;
		box-sizing: border-box;
	}

	.cb-cell input[type="checkbox"] {
		width: 20px;
		height: 20px;
		cursor: pointer;
		accent-color: #e74c3c;
	}
	</style>
</head>
<body>
	<!-- Checkbox overlay: 8 cells aligned with box[0]~box[7] -->
	<!-- Positioned by JS after director scales the canvas -->
	<div id="checkbox-overlay">
		<div id="checkbox-row">
			<div class="cb-cell"><input type="checkbox" id="cb0" title="格子 1"></div>
			<div class="cb-cell"><input type="checkbox" id="cb1" title="格子 2"></div>
			<div class="cb-cell"><input type="checkbox" id="cb2" title="格子 3"></div>
			<div class="cb-cell"><input type="checkbox" id="cb3" title="格子 4"></div>
			<div class="cb-cell"><input type="checkbox" id="cb4" title="格子 5"></div>
			<div class="cb-cell"><input type="checkbox" id="cb5" title="格子 6"></div>
			<div class="cb-cell"><input type="checkbox" id="cb6" title="格子 7"></div>
			<div class="cb-cell"><input type="checkbox" id="cb7" title="格子 8"></div>
		</div>
	</div>

	<script>
	// After the game director is created, the canvas is scaled to fit the viewport.
	// We compute the same scale and offset to align our overlay.
	function positionCheckboxRow() {
		var GAME_W = 1024, GAME_H = 768;
		// box parameters (from sort_scale.js):
		//   startX = (1024-960)/2 + 60 = 92  (center of first box)
		//   box left edge = startX - 60 = 32
		//   box top edge  = (sort_scale.Height-90) - 70 = 768-90-70 = 608
		var BOX_LEFT_GAME = 32;   // left edge of box[0] in game coords
		var BOX_TOP_GAME  = 608;  // top edge of boxes in game coords
		var BOX_W_GAME    = 120;
		var NUM_BOXES     = 8;

		var vw = window.innerWidth, vh = window.innerHeight;
		// lime.Director scales uniformly to fit the viewport
		var scale = Math.min(vw / GAME_W, vh / GAME_H);
		var offsetX = (vw - GAME_W * scale) / 2;
		var offsetY = (vh - GAME_H * scale) / 2;

		var row = document.getElementById('checkbox-row');
		if (!row) return;

		var left  = offsetX + BOX_LEFT_GAME * scale;
		var top   = offsetY + BOX_TOP_GAME  * scale;
		var cellW = BOX_W_GAME * scale;
		var cellH = Math.max(22, 30 * scale);

		row.style.left = left + 'px';
		row.style.top  = top  + 'px';

		var cells = row.querySelectorAll('.cb-cell');
		cells.forEach(function(c) {
			c.style.width  = cellW + 'px';
			c.style.height = cellH + 'px';
		});
	}

	// Run after game starts (short delay for director init)
	window.addEventListener('load', function() {
		setTimeout(positionCheckboxRow, 500);
	});
	window.addEventListener('resize', positionCheckboxRow);
	</script>
   	<script type="text/javascript">
		(function(name,callback){

			var getObjectByName = function(name, opt_obj) {
				var parts = name.split('.');
				var cur = opt_obj || window;
				for (var part; part = parts.shift(); ) {
					if (cur[part]) {
						cur = cur[part];
					} else {
						return null;
					}
				}
				return cur;
			};

			function loadJS(call){
				var script = document.createElement('script');
				script.setAttribute('type','text/javascript');
				script.onload = function(){
					(getObjectByName(callback))();
					call();
				};

				script.setAttribute('src',name);
				document.getElementsByTagName('head')[0].appendChild(script);
			}

			var webappCache = window.applicationCache;

			if(webappCache && window.navigator.userAgent.indexOf('WebKit') != -1){

				var WIDTH = 200,
					HEIGHT = 100;

				var scripts = document.getElementsByTagName('script');
				var script = scripts[scripts.length-1];
				var el = document.createElement('div');
				var parent = script.parentNode;
				if(parent.style.position!='absolute' && parent.style.position!='relative'){
					parent.style.cssText = 'relative';
				}
				var pwidth = window.innerWidth;
				var pheight = window.innerHeight;
				el.style.cssText = 'text-align:center;width:'+WIDTH+'px;height:'+HEIGHT+'px;position:absolute;left:'+Math.round((pwidth-WIDTH)*.5)+'px;top:'+Math.round((pheight-HEIGHT)*.5)+'px';
				script.parentNode.insertBefore(el,script);
				script.parentNode.removeChild(script);

				var started = 0;

				var close = function(){
					if(started) return;
					el.innerHTML = 'Starting';
					loadJS(function(){
						el.parentNode.removeChild(el);
					});
					started=1;
					clearTimeout(timeout);
				};

				var timeout = setTimeout(function(){close()},1000);

				webappCache.addEventListener('checking', function(){
					//console.log('checking');
					el.innerHTML = 'Initializing';
					},false);

				webappCache.addEventListener('cached', function(){
					//console.log('cached');
					close();
				},false);

				webappCache.addEventListener('noupdate', function(){
					//console.log('noupdate');
					close();
				},false);

				webappCache.addEventListener('updateready', function(){
					//console.log('updateready');
					webappCache.swapCache();
					close();
				},false);
/*
			webappCache.addEventListener('downloading', function(){
					clearTimeout(timeout);
				},false);

				webappCache.addEventListener('progress', function(e){
					console.log('progress '+e.loaded+'/'+e.total);
					el.innerHTML = 'Loading '+e.loaded+'/'+e.total;
				},false);
*/
				webappCache.addEventListener('obsolete', function(){
					//console.log('obsolete')
					close();
				}, false);

				webappCache.addEventListener('error', function(e){
					//console.log('error');
					close();
				}, false);
			}
			else {
				loadJS(function(){});
			}

		})('sort_scale.js','sort_scale.start');

		</script>
</body>

</html>
