<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>媒體識讀大挑戰 - 直線滑動完美版</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: #fff; touch-action: none; }
        #app { width: 100%; max-width: 400px; height: 85vh; max-height: 750px; position: relative; background: #1a1a1a; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden; }
        .header { text-align: center; padding: 15px; background: transparent; position: absolute; top: 0; width: 100%; z-index: 999; font-weight: bold; font-size: 1.2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
        
        /* 容器 */
        #card-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        /* 卡片共用樣式：touch-action:none 是手機不卡住的關鍵 */
        .card { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #2c2c2c; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; 
            user-select: none; touch-action: none; -webkit-user-drag: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        
        /* 定義頂層與底層卡片 */
        .top-card { z-index: 2; cursor: grab; }
        .top-card:active { cursor: grabbing; }
        .bottom-card { z-index: 1; transform: scale(0.95); opacity: 0.8; }
        
        /* 缺圖佔位設計 */
        .img-fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #777; z-index: 1; pointer-events: none; }
        .img-fallback span.icon { font-size: 3rem; margin-bottom: 10px; opacity: 0.5; }
        
        /* 圖片區域 */
        .card img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        
        /* 文字區域：底部加深黑色漸層，防止白字看不清楚 */
        .card-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 60px 20px 30px; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0) 100%); z-index: 3; pointer-events: none; }
        .card-content h2 { margin: 0 0 8px 0; font-size: 1.5rem; line-height: 1.3; text-shadow: 1px 1px 3px rgba(0,0,0,1); }
        .card-content p { margin: 0; font-size: 1rem; color: #ddd; line-height: 1.5; text-shadow: 1px 1px 3px rgba(0,0,0,1); }
        
        /* 畫面正中央的半透明提示膠囊 */
        .hint { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.75); padding: 12px 24px; border-radius: 30px; 
            font-size: 0.95rem; color: rgba(255, 255, 255, 0.95); pointer-events: none; 
            z-index: 900; white-space: nowrap; backdrop-filter: blur(5px); 
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 分享/不分享印章 (移除旋轉角度，更俐落) */
        .badge { position: absolute; top: 60px; padding: 5px 15px; border-radius: 8px; font-weight: 900; font-size: 2rem; opacity: 0; z-index: 10; text-transform: uppercase; border: 4px solid; letter-spacing: 2px; }
        .badge.like { color: #4CAF50; border-color: #4CAF50; right: 30px; background: rgba(0,0,0,0.6); }
        .badge.nope { color: #F44336; border-color: #F44336; left: 30px; background: rgba(0,0,0,0.6); }

        /* 結果統計頁面 */
        #results { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; background: #1a1a1a; color: #fff; z-index: 1000; position: absolute; top: 0; left: 0; }
        .result-section { margin-bottom: 20px; padding: 15px; border-radius: 10px; }
        .result-share { background-color: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; }
        .result-noshare { background-color: rgba(244, 67, 54, 0.1); border: 1px solid #F44336; }
        .result-item { font-size: 0.9rem; margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 5px; display: flex; justify-content: space-between;}
        .result-time { color: #aaa; font-size: 0.8rem; }
        .stats-summary { font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 2px solid #444; padding-bottom: 10px;}
        .btn-restart { width:100%; padding:15px; background: linear-gradient(45deg, #ff4b4b, #ff7b7b); color:white; border:none; border-radius:30px; font-size:1.1rem; font-weight: bold; cursor:pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255, 75, 75, 0.3); }
    </style>
</head>
<body>

<div id="app">
    <div class="header">媒體識讀大挑戰</div>
    <div id="card-container"></div>
    <div class="hint">👈 滑左:不分享 | 滑右:分享 👉</div>

    <div id="results">
        <h2 style="text-align:center; margin-top: 10px;">挑戰結果統計</h2>
        <div id="share-stats" class="result-section result-share"></div>
        <div id="noshare-stats" class="result-section result-noshare"></div>
        <button class="btn-restart" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    // --- 音效設定 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSwipeSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'right') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        } else {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        }
        osc.start(); 
        osc.stop(audioCtx.currentTime + 0.15);
    }

    // --- 案例資料庫 ---
    const cases = [
        { id: 1, title: "關羽刮骨療傷", desc: "關羽右臂中劇毒，華佗切開皮肉用刀刮骨，關羽仍能正常飲食、談笑。", img: "img-fake/case1.jpg" },
        { id: 2, title: "趙雲長坂坡七進七出", desc: "趙雲單槍匹馬殺入敵陣，抱著劉禪，殺出重圍。", img: "img-fake/case2.jpg" },
        { id: 3, title: "飯店泳池成網美景點", desc: "住飯店也能清涼一下，飯店無邊際泳池成銷售賣點。", img: "img-fake/case3.jpg" },
        { id: 4, title: "AI一拍即型掀排隊人潮", desc: "台灣品牌搭載AI新科技，Zenfone 12 Ultra 熱賣。", img: "img-fake/case4.jpg" },
        { id: 5, title: "智慧型手機終結相機", desc: "智慧型手機問世後，完全取代相機成為主流，數位相機產量暴跌。", img: "img-fake/case5.jpg" },
        { id: 6, title: "周幽王烽火戲諸侯", desc: "周幽王為博褒姒一笑，多次點燃烽火欺騙諸侯，終致失卻信任。", img: "img-fake/case6.jpg" },
        { id: 7, title: "秦始皇焚書坑儒", desc: "秦始皇為統一思想燒毀史書百家語，並坑殺儒生方士四百六十餘人。", img: "img-fake/case7.jpg" },
        { id: 8, title: "光電板毒害養殖魚？", desc: "網傳光電板破損漏毒，事實查核中心澄清：矽晶太陽能板不會毒害養殖魚。", img: "img-fake/case8.jpg" },
        { id: 9, title: "丹娜絲重創嘉義光電板", desc: "颱風摧毀數百面水面型光電板，殘骸散落引發民眾對水源汙染的疑慮。", img: "img-fake/case9.jpg" },
        { id: 10, title: "颱風天搭計程車出勤", desc: "勞動部提醒，若經勞工同意出勤，因大眾運輸受阻改搭計程車，費用應由雇主支付。", img: "img-fake/case10.jpg" },
        { id: 11, title: "放颱風假台灣損失315億", desc: "媒體人指出日本沒颱風假，台灣放一天可能造成至少315億元經濟損失。", img: "img-fake/case11.jpg" },
        { id: 12, title: "颱風假風險分攤", desc: "評論建議勞工颱風假至少領半薪或以特休替代，讓勞資雙方更公平分攤風險。", img: "img-fake/case12.jpg" },
        { id: 13, title: "短影音看多變抖音腦", desc: "研究顯示，頻繁觀看短影音會影響兒少腦部發育，注意力時間縮短。", img: "img-fake/case13.jpg" },
        { id: 14, title: "電源軌旁勿用藍牙耳機", desc: "網傳：在電動火車軌道旁用藍牙耳機會引導高壓電流進入大腦。", img: "img-fake/case14.jpg" },
        { id: 15, title: "手機電池剩一格輻射千倍", desc: "網傳：手機電池剩一格時輻射是平時的一千倍，用右耳接會傷害大腦。", img: "img-fake/case15.jpg" },
        { id: 16, title: "手機訊號剩一格電磁波強", desc: "專家澄清：手機訊號差時會加大功率，此時手機本身電磁波反而最強。", img: "img-fake/case16.jpg" },
        { id: 17, title: "無痕模式有紀錄嗎？", desc: "無痕模式無法隱藏IP位址，網路活動仍會被ISP和網站追蹤器記錄。", img: "img-fake/case17.jpg" },
        { id: 18, title: "拍護照封面洩漏個資", desc: "網傳出國拍護照封面發限動，會因為晶片標誌或圓形logo外洩個資。", img: "img-fake/case18.jpg" },
        { id: 19, title: "拍照比YA恐被偷指紋", desc: "陸媒指1.5公尺內拍攝V字手勢能100%還原指紋，但專家稱實際操作並不容易。", img: "img-fake/case19.jpg" },
        { id: 20, title: "鍘美案", desc: "陳世美貪圖富貴隱瞞已婚當駙馬，甚至派人追殺妻兒，最終被包拯以龍頭鍘處斬。", img: "img-fake/case20.jpg" },
        { id: 21, title: "晚安小雞柬埔寨直播", desc: "網紅晚安小雞開直播稱自己在柬埔寨遭綁、電擊、剃頭、搶劫。", img: "img-fake/case21.jpg" },
        { id: 22, title: "青花瓷魚世罕見", desc: "網傳影片展示花紋宛如青花瓷般漂亮的錦鯉魚。", img: "img-fake/case22.jpg" },
        { id: 23, title: "漁電共生如廢墟", desc: "網友發文指稱光電發展失去平衡，大型案場像廢墟一樣。", img: "img-fake/case23.jpg" },
        { id: 24, title: "光電板破壞農田水庫", desc: "抖音影片指控滿山滿谷的光電板大肆破壞台灣國土山坡與農田。", img: "img-fake/case24.jpg" },
        { id: 25, title: "格致路滑水道", desc: "影片拍下文化大學外淹水，被網友戲稱為「格致路滑水道」，像在玩泛舟。", img: "img-fake/case25.jpg" },
        { id: 26, title: "偏遠地區老虎出沒", desc: "網傳偏遠地區有老虎捕食的殘酷畫面。", img: "img-fake/case26.jpg" },
        { id: 27, title: "接電話被拍 Face ID", desc: "網傳接起不明視訊電話會被拍下 Face ID 並錄音，進而利用 AI 詐騙朋友。", img: "img-fake/case27.jpg" },
        { id: 28, title: "無家可歸老夫婦二重奏", desc: "網傳90歲無家可歸老夫婦的音樂二重奏震撼全場，讓人感動落淚。", img: "img-fake/case28.jpg" },
        { id: 29, title: "切開鸚鵡蛋糕", desc: "影片展示一隻極度逼真的紅金剛鸚鵡，結果被切開發現其實是蛋糕。", img: "img-fake/case29.jpg" }
    ];

    // --- 雙卡核心系統 (徹底解決卡死與文字沒變的問題) ---
    let currentIndex = 0;
    let currentStartTime = Date.now();
    const results = { share: [], noshare: [] };
    const container = document.getElementById('card-container');

    // 每次只渲染兩張卡片：一張在最上面(Top)，一張在下面準備(Bottom)
    function renderCards() {
        container.innerHTML = ''; 

        if (currentIndex >= cases.length) {
            showResults();
            return;
        }

        // 建立底層卡片 (下一題)
        if (currentIndex + 1 < cases.length) {
            const bottomCard = buildCard(cases[currentIndex + 1], false);
            container.appendChild(bottomCard);
        }

        // 建立頂層卡片 (目前這題)
        const topCard = buildCard(cases[currentIndex], true);
        container.appendChild(topCard);
        currentStartTime = Date.now();
    }

    function buildCard(data, isTop) {
        const card = document.createElement('div');
        card.className = 'card ' + (isTop ? 'top-card' : 'bottom-card');
        
        card.innerHTML = `
            <div class="badge like">分享</div>
            <div class="badge nope">不分享</div>
            <div class="img-fallback">
                <span class="icon">📷</span>
                <span>圖片載入中...</span>
            </div>
            <img src="${data.img}" draggable="false" onerror="this.style.opacity='0';">
            <div class="card-content">
                <h2>${data.title}</h2>
                <p>${data.desc}</p>
            </div>
        `;

        // 只有頂層卡片才有滑動功能
        if (isTop) {
            attachDragEvents(card, data);
        }
        return card;
    }

    // --- 完美防干擾的 PointerEvents 滑動邏輯 ---
    function attachDragEvents(el, data) {
        let isDragging = false;
        let startX = 0;

        el.addEventListener('pointerdown', e => {
            isDragging = true;
            startX = e.clientX;
            el.style.transition = 'none'; // 拔掉動畫讓拖曳跟手
            el.setPointerCapture(e.pointerId); // 鎖定觸控焦點
            initAudio();
        });

        el.addEventListener('pointermove', e => {
            if (!isDragging) return;
            const currentX = e.clientX;
            const diffX = currentX - startX;
            
            // 只有 X 軸直線移動 (移除 Y 與 Rotate)
            el.style.transform = `translateX(${diffX}px)`;
            
            const likeBadge = el.querySelector('.like');
            const nopeBadge = el.querySelector('.nope');
            
            if (diffX > 20) {
                likeBadge.style.opacity = Math.min(diffX / 80, 1);
                nopeBadge.style.opacity = 0;
            } else if (diffX < -20) {
                nopeBadge.style.opacity = Math.min(Math.abs(diffX) / 80, 1);
                likeBadge.style.opacity = 0;
            } else {
                likeBadge.style.opacity = 0;
                nopeBadge.style.opacity = 0;
            }
        });

        const onDragEnd = e => {
            if (!isDragging) return;
            isDragging = false;
            el.releasePointerCapture(e.pointerId);

            const diffX = e.clientX - startX;
            const decisionTime = (Date.now() - currentStartTime) / 1000;
            
            el.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';

            // 滑動門檻判定 (超過 60px 就判定成功，滑起來更輕鬆)
            if (diffX > 60) {
                el.style.transform = `translateX(${window.innerWidth + 100}px)`; // 直線飛出右邊
                el.style.opacity = 0;
                playSwipeSound('right');
                results.share.push({ case: data, time: decisionTime });
                proceedToNext();
            } else if (diffX < -60) {
                el.style.transform = `translateX(-${window.innerWidth + 100}px)`; // 直線飛出左邊
                el.style.opacity = 0;
                playSwipeSound('left');
                results.noshare.push({ case: data, time: decisionTime });
                proceedToNext();
            } else {
                // 回彈
                el.style.transform = `translateX(0px)`;
                el.querySelector('.like').style.opacity = 0;
                el.querySelector('.nope').style.opacity = 0;
            }
        };

        el.addEventListener('pointerup', onDragEnd);
        el.addEventListener('pointercancel', onDragEnd);
    }

    // --- 切換下一張 ---
    function proceedToNext() {
        // 等待飛出動畫 (0.3秒) 結束後，更新 Index 並重新渲染雙卡
        setTimeout(() => {
            currentIndex++;
            renderCards(); // 這行保證了 HTML 標籤會完全換成下一題，文字絕對會更新！
        }, 300);
    }

    // --- 顯示結果頁面 ---
    function showResults() {
        document.getElementById('card-container').style.display = 'none';
        document.querySelector('.hint').style.display = 'none';
        document.getElementById('results').style.display = 'block';

        const calcAvgTime = (arr) => {
            if(arr.length === 0) return 0;
            return (arr.reduce((sum, item) => sum + item.time, 0) / arr.length).toFixed(1);
        };

        const renderList = (divId, arr, icon, title) => {
            const div = document.getElementById(divId);
            const avg = calcAvgTime(arr);
            div.innerHTML = `<div class="stats-summary">${icon} 決定「${title}」共 ${arr.length} 則 <br><span style="font-size:0.9rem; font-weight:normal; color:#ccc;">(平均猶豫: ${avg} 秒)</span></div>`;
            arr.forEach(item => {
                div.innerHTML += `
                    <div class="result-item">
                        <span>▶ ${item.case.title}</span>
                        <span class="result-time">${item.time.toFixed(1)}s</span>
                    </div>`;
            });
        };

        renderList('share-stats', results.share, '✅', '分享給朋友');
        renderList('noshare-stats', results.noshare, '❌', '不分享');
    }

    // 啟動應用程式
    renderCards();
</script>
</body>
</html>
